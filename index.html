  <a href="#" class="work-link" data-title="The Exiled Realm" data-meta="2025" data-desc-en="Collected from the internet, these screenshots were taken during the final moments before the MMORPG TERA shut down and are printed onto acrylic panels. Circumstances outside the game ultimately determine the fate of the world within it. Even so, people confronted its ending in their own ways, gathering to share their farewell to this world." data-desc-jp="UV Printing on acrylic. MMORPG TERA のサービス終了間際のスクリーンショットをインターネットから収集し、アクリルに印刷をしている。ゲームの外側にある事情が、内側の世界の運命を決定する。それでも人々は、自分たちなりのやり方でその終わりに向き合い、この世界との別れを共有しようとする。" data-image="works/The_Exiled_Realm.jpg">The Exiled Realm</a>
  <br>
  <a href="#" class="work-link" data-title="Gather Balloons" data-meta="2025" data-desc-en="In BIOHAZARD 7 RESIDENT EVIL, there is an item called a videotape that allows players to control characters recorded within past events. These tapes are consumed as tools for progression. Players watch them from the Safe Room —a space where they can save the game, store items, and remain completely protected from external threats.This video installation examines the perspective of occupying a safe position while playing a game or watching moving images.The footage recorded on the videotape repeats the same ending each time. The characters exist only to provide clues for the player's future progression, while the objects and mechanisms within the tape function as flags that lead inevitably toward a predetermined conclusion: the character's death by fire. Among these elements, a single balloon—placed merely as decorative scenery intended to unsettle the player—exists independently of gameplay objectives and progression.Using the distorted structure of something that is simultaneously a video recording and a game, this work deliberately ignores all of the essential flags required to reach the ending. Instead, it repeatedly performs a meaningless action: carrying the balloon from one room to another.Through this act, the work invites viewers to reconsider the relationship between the player and the character trapped within the image." data-desc-jp="BIOHAZARD 7 RESIDENT EVILには記録された映像の中の人物を操作することのできるアイテム「ビデオテープ」が存在する。このアイテムは、それを見るプレイヤーの攻略のために消費されるものである。プレイヤーは「セーフルーム」と呼ばれるセーブやアイテムの保管が可能で、外敵から決して襲われることのない安全な空間に身を置いて、その内部に設置された映像装置でビデオテープを再生する。本映像インスタレーションはゲームをプレイする時、あるいは映像を見る時に現れる「安全な位置」からの視点についての作品である。ビデオテープに記録された映像は毎回同じ結末を繰り返し、キャラクターはプレイヤーにその後の進行を示唆するためだけの存在として機能する。ビデオテープ内に配置されたオブジェクトと仕組みは、結末に向かうためのフラグとなっている。結末はキャラクターが炎に包まれて死んでしまうことが確定している。その中で唯一、怖がらせるために用意された装飾である風船が、攻略やフラグとは無関係に存在している。映像でありながらゲームでもあるという歪んだ構造を利用し、ビデオテープ内に存在する攻略上必須のフラグを一切回収せずに、ただ風船を別の部屋に運ぶという行為を繰り返す。この行為を通じて、プレイヤーと映像内のキャラクターとの関係性を見つめ直す。" data-video="https://www.youtube.com/embed/di_pc6aHPxw?si=KANEijFsRtDOHm74">Gather Balloons</a>
  <br>
  <a href="#" class="work-link" data-title="Internet Aqualine" data-meta-en="2025" data-meta-jp="2025" data-desc-en="This work constructs a program that sends and receives a dolphin GIF file between VPS servers located in different countries, circulating counterclockwise around the globe. A display suspended above shows the dolphin animation, while its image is reflected onto the floor as it passes through this site. At the center of the installation, communication logs and terminal consoles continuously display the real-time status of the nine servers.The transmitted file, *dolphin.gif*, is a lightweight animation format limited to 256 colors and has long been widely used in online communication. Unlike conventional video, GIFs cannot be played, paused, or controlled by the user; they repeat autonomously and endlessly. Through this ceaseless circulation, the work seeks to spatialize the otherwise invisible flow of information across the internet and the particular experience of time that accompanies it." data-desc-jp="本作では、各国のVPSサーバー間でイルカのGIFデータを反時計回りに送受信するプログラムを構築している。上部のディスプレイにはイルカの映像が映し出され、床面にはこの場所を経由するイルカの像が反射的に現れる。中央には通信ログやコンソールが配置され、9つのサーバーの状態がリアルタイムに表示され続ける。送受信される「dolphin.gif」は、256色の限られた階調を持つ軽量なアニメーション形式であり、ウェブ上のコミュニケーションで広く用いられてきた。GIFは再生や停止をユーザーが制御できず、自律的に反復し続ける。本作は、その終わりのない循環を通して、普段は不可視なインターネット上の情報の流通と、それに伴う時間のあり方を空間化する試みである。" data-image="works/Internet_Aqualine.png">Internet Aqualine</a>

  <!-- Modal Popup -->
  <div id="popup-modal" class="modal hidden">
    <div class="modal-content">
      <img id="popup-image" class="hidden" src="" alt="">
      <iframe id="popup-video" class="hidden" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      <div class="popup-text">
        <span class="popup-line" id="popup-title"></span>
        <span class="popup-line" id="popup-meta"></span>
        <span class="popup-line" id="popup-desc"></span>
      </div>
    </div>
  </div>

  <script>
    const langButtons = document.querySelectorAll('.lang-button');
    const links = document.querySelectorAll('.work-link');
    const modal = document.getElementById('popup-modal');
    const popupImage = document.getElementById('popup-image');
    const popupVideo = document.getElementById('popup-video');
    const popupTitle = document.getElementById('popup-title');
    const popupMeta = document.getElementById('popup-meta');
    const popupDesc = document.getElementById('popup-desc');

    let currentLanguage = 'en';

    function setLanguage(lang) {
      currentLanguage = lang;
      langButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.lang === lang);
      });
    }

    let currentLink = null;

    langButtons.forEach((button) => {
      button.addEventListener('click', () => {
        setLanguage(button.dataset.lang);
        if (currentLink && !modal.classList.contains('hidden')) {
          updatePopup(currentLink);
        }
      });
    });

    function updatePopup(link) {
      const title = link.dataset.title || link.textContent.trim();
      const meta = link.getAttribute(`data-meta-${currentLanguage}`) || link.dataset.meta || '';
      const desc = link.getAttribute(`data-desc-${currentLanguage}`) || link.dataset.desc || '';
      const image = link.dataset.image || '';
      const video = link.dataset.video || '';

      popupTitle.textContent = title;
      popupTitle.style.display = 'inline-block';
      
      popupMeta.textContent = meta;
      popupMeta.style.display = meta ? 'inline-block' : 'none';
      
      popupDesc.innerHTML = desc;
      popupDesc.style.display = desc ? 'inline-block' : 'none';

      if (video) {
        popupVideo.src = video;
        popupVideo.classList.remove('hidden');
        popupImage.classList.add('hidden');
      } else {
        popupVideo.src = '';
        popupVideo.classList.add('hidden');
        if (image) {
          popupImage.src = image;
          popupImage.alt = title;
          popupImage.classList.remove('hidden');
        } else {
          popupImage.classList.add('hidden');
        }
      }
    }

    links.forEach((link) => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        currentLink = link;
        updatePopup(link);
        modal.classList.remove('hidden');
      });
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.add('hidden');
      }
    });

    setLanguage('en');
  </script>
</body>
